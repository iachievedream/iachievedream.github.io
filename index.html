<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume</title>
    <!-- <script src="https://unpkg.com/vue/dist/vue.js"></script> -->
    <script src="vue.js"></script>
    <link rel="stylesheet" type="text/css" href="css.css">
</head>

<body>
    <div id="resume">
        <div id="mymain" class="main">
            <font size="5">
                <span v-html="name.chinese"></span>
                <span v-html="name.english"></span>
                <br>
                <a v-bind:href="contect.github">
                    <img class="incon" v-bind:src="contect.githubicon" />
                </a>
                <a v-bind:href="contect.fb">
                    <img class="incon" v-bind:src="contect.fb_incon" />
                </a>
                <a v-bind:href="contect.web">
                    <img class="incon" v-bind:src="contect.web_icon" />
                </a>
            </font>
            <div v-html="name.content"></div>
            <!-- v-bind:href可以簡化為:href -->
            <!-- githubicon,github_icon後則無法有圖片 -->
        </div>
        <div id="myex" class="ex">
            <div v-html="title.content2"></div>
            <ul v-for="experience in experiences" style="padding-inline-start:20px;">
                <li >{{ experience.text }}</li>
            </ul>
        </div>
        <div id="myex" class="ex">
            <div v-html="title.content3"></div>
            <!-- 兩組vue的迴圈還在思考如何呈現會比較好 -->
            <div id="circle">1</div><span v-html="skills.skill1"></span><br>
            <div id="circle">2</div><span v-html="skills.skill2"></span><br>
            <div id="circle">3</div><span v-html="skills.skill3"></span><br>
            <div id="circle">4</div><span v-html="skills.skill4"></span><br>
            <div id="circle">5</div><span v-html="skills.skill5"></span><br>
            <!-- <li v-for="skill in skills">{{ skill.text }} -->

        </div>
        <div class="demo">
            <div v-html="title.content4"></div>
            <div id="circle">1</div><span v-html="demo.title1"></span><a v-bind:href="demo.href1"><span
                    v-html="demo.content1"></a><span v-html="demo.description1"></span><br>
            <div id="circle">2</div><span v-html="demo.title2"></span><a v-bind:href="demo.href2"><span
                    v-html="demo.content2"></a><span v-html="demo.description2"></span><br>
            <!-- <div id="circle">3</div><span v-html="demo.title3"></span><a v-bind:href="demo.href3"><span
                    v-html="demo.content3"></a><br>
            <div id="circle">4</div><span v-html="demo.title4"></span><a v-bind:href="demo.href4"><span
                    v-html="demo.content4"></a><br> -->
        </div>

        <div class="github">
            <div v-html="title.content5"></div>
            <div id="circle">1</div><span v-html="demobook.title1"></span><a v-bind:href="demobook.href1"><span
                    v-html="demobook.content1"></a><br>
            <div id="circle">2</div><span v-html="demobook.title2"></span><a v-bind:href="demobook.href2"><span
                    v-html="demobook.content2"></a><br>
        </div>

        <div class="exfoot">
            <div v-html="title.content6"></div>
            <div id="circle">1</div><span v-html="demo_code.title1"></span>
            <a v-bind:href="demo_code.href1"><span v-html="demo_code.hrefcontent1"></a><br>
            <span v-html="demo_code.movie1"></span>
            <a v-bind:href="demo_code.moviehref1"><span v-html="demo_code.moviecontent1"></a><br>
            <div id="circle">2</div><span v-html="demo_code.title2"></span>
            <a v-bind:href="demo_code.href2"><span v-html="demo_code.hrefcontent2"></a><br>
            <span v-html="demo_code.movie2"></span>
            <a v-bind:href="demo_code.moviehref2"><span v-html="demo_code.moviecontent2"></a><br>
        </div>

        <!-- <img id="line" src="line.png"> -->

        <div class="foot">iachievedream foot 2020</div>
    </div>
    <script src="html_vue.js"></script>
</body>

</html>
